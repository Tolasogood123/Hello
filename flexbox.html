<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Flexbox</title>
    <style>
      #container{
        display: flex;
        flex-wrap: wrap;
      }
      #container> div{
        background-color: springgreen;
        font-size: 20px;
        padding: 10px;
        margin: 5px;
        width: 30%;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div>1.This is sample inside a flex container</div>
      <div>2.This is sample inside a flex container</div>
      <div>3.This is sample inside a flex container</div>
      <div>4.This is sample inside a flex container</div>
      <div>5.This is sample inside a flex container</div>
      <div>6.This is sample inside a flex container</div>
    </div>
  </body>
</html>
