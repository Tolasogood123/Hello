<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Table</title>
    <link rel="stylesheet" href="variable.css">
    <style>
      table {
        border: 1px solid black;
        border-collapse: collapse;
      }
      th, td {
        border: 0.5px solid black;
        text-align: center;
        padding: 10px;
      }
    </style>
  </head>
  <body>

    <!-- Unordered List -->
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>

    <!-- Ordered List -->
    <ol>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ol>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Ocean</th>
          <th>Average Depth</th>
          <th>Maximum Depth</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Pacific Ocean</td>
          <td>3,970 m</td>
          <td>10,911 m</td>
        </tr>
        <tr>
          <td>Atlantic Ocean</td>
          <td>4,000 m</td>
          <td>5,000 m</td>
        </tr>
      </tbody>
    </table>

  </body>
</html>
